<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <title>EimizuDev Portfolio</title>
    <meta name="description" content="EimizuDev portfolio">
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex">
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/EimizuDev/afr-voxel-engine/refs/heads/main/docs/gifs/voxels.gif" type="image/gif" fetchpriority="high" crossorigin>
  </head>
  <body>
    <header>
      <nav>
        <button class="nav-hamburger" type="button" aria-label="Open navigation menu" onclick="ToggleHam();">
          <span class="nav-bar" aria-hidden="true"></span>
          <span class="nav-bar" aria-hidden="true"></span>
          <span class="nav-bar" aria-hidden="true"></span>
        </button>
        <div style="position: relative;">
          <div aria-hidden="true" id="hover-slider"></div>
          <ul>
            <li id="hero-nav" onmouseover="TransformHoverSlider(0)"><a href="#hero">Home</a></li>
            <li id="about-me-nav" onmouseover="TransformHoverSlider(1)"><a href="#about-me">About me</a></li>
            <li id="projects-nav" onmouseover="TransformHoverSlider(2)"><a href="#projects">Projects</a></li>
            <li id="contacts-nav" onmouseover="TransformHoverSlider(3)"><a href="#contacts">Contacts</a></li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section id="hero">
        <div class="hero-content">
          <h1>
            <strong style="font-size: 50px">Hi, I'm <span class="hero-content-name">EimizuDev</span></strong>
            <br>
            <strong style="font-size: 30px">Graphics · Game Development · Embedded Curiosity</strong>
          </h1>
          <p>Turning curiosity into prototypes. Currently working on a voxel game engine.</p>
          <div class="hero-buttons">
            <button type="button" onclick="location.href='#projects';">Projects</button>
            <button type="button" onclick="location.href='#contacts';">Contacts</button>
          </div>
        </div>
        <div class="hero-visual" style="position: relative;">
          <div class="hero-visual-frame">
            <div class="hero-visual-inside-frame">
              <img src="https://raw.githubusercontent.com/EimizuDev/afr-voxel-engine/refs/heads/main/docs/gifs/voxels.gif" id="hero-image">
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>© 2026 EimizuDev All rights reserved.</footer>
    <script src="script.js"></script>
  </body>
</html>
